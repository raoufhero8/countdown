<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Special Surprise 💖</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    overflow:hidden;
    background: linear-gradient(270deg,#ff6ec4,#7873f5,#42e695);
    background-size:600% 600%;
    animation:bg 10s infinite;
}

@keyframes bg{
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
}

.container{
    background:rgba(255,255,255,0.9);
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
    color:#d63384;
}

.name{
    font-size:28px;
    color:#ff4da6;
    margin:10px 0;
    font-weight:bold;
}

.timer{
    font-size:24px;
    margin-top:20px;
}

/* الجملة الرومانسية */
.footer{
    margin-top:15px;
    font-size:18px;
    color:#d63384;
    font-weight:bold;
}

#qrcode img{
    width:200px;
    border-radius:15px;
    box-shadow:0 0 25px #ff69b4;
    transform:scale(0);
    opacity:0;
    transition:0.8s;
}

.showQR img{
    transform:scale(1) !important;
    opacity:1 !important;
}

/* كود الموسيقى */
.music-control{
    margin-top:20px;
}

.music-control button{
    padding:10px 20px;
    font-size:16px;
    border:none;
    border-radius:10px;
    background:#ff4da6;
    color:white;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s;
}

.music-control button:hover{
    background:#d63384;
}
</style>
</head>

<body>

<div class="container">
    <h1>A Special Surprise is Coming 💖</h1>
    <div class="name">Meriem</div>

    <div class="timer" id="timer">
        <span id="d"></span>d :
        <span id="h"></span>h :
        <span id="m"></span>m :
        <span id="s"></span>s
    </div>

    <div class="footer">I prepared the best for you 💌</div>

    <div id="qrcode"></div>

    <!-- مشغل الموسيقى -->
    <div class="music-control">
        <audio id="music" src="music.mp3" loop></audio>
        <button id="playBtn">▶️ Play Music</button>
    </div>
</div>

<script>
// ⏳ التاريخ المستهدف
const target = new Date("2026-04-07T00:00:00").getTime();

// العداد
const timer = setInterval(()=>{

    let now = new Date().getTime();
    let diff = target - now;

    if(diff < 0){
        clearInterval(timer);

        // تغيير النص
        document.getElementById("timer").innerHTML =
        "Scan to unlock your surprise ... 👀";
        
        // إضافة صورة QR
        document.getElementById("qrcode").innerHTML =
        '<img src="Qrcode.jpg">';

        // أنيميشن
        setTimeout(()=>{
            document.getElementById("qrcode").classList.add("showQR");
        },200);

        return;
    }

    document.getElementById("d").innerHTML = Math.floor(diff/(1000*60*60*24));
    document.getElementById("h").innerHTML = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    document.getElementById("m").innerHTML = Math.floor((diff%(1000*60*60))/(1000*60));
    document.getElementById("s").innerHTML = Math.floor((diff%(1000*60))/1000);

},1000);

// التحكم بالموسيقى
const music = document.getElementById("music");
const playBtn = document.getElementById("playBtn");

playBtn.addEventListener("click", () => {
    if(music.paused){
        music.play();
        playBtn.textContent = "⏸️ Pause Music";
    } else {
        music.pause();
        playBtn.textContent = "▶️ Play Music";
    }
});
</script>

</body>
</html>
