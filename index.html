<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>surprise for you 🫶🏻💖</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Poppins', sans-serif;
    overflow:hidden;

    background: linear-gradient(270deg,#ff6ec4,#7873f5,#42e695,#ffd86f);
    background-size:600% 600%;
    animation:bg 12s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* الكارت */
.container{
    width: 360px;
    padding: 50px 30px;
    text-align:center;
    background: rgba(255,255,255,0.95);
    border-radius: 28px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.3);
}

/* ✨ النصوص اللي تلمع */
h1, .name, .footer{
    animation: glow 2.5s infinite;
}

/* الاسم */
.name{
    font-size: 26px;
    font-weight: bold;
    color:#ff4da6;
    margin: 10px 0 25px;
}

/* glow effect */
@keyframes glow{
    0%{
        text-shadow: 0 0 5px rgba(255,255,255,0.3),
                     0 0 10px rgba(255,77,166,0.3);
    }
    50%{
        text-shadow: 0 0 10px rgba(255,255,255,0.7),
                     0 0 25px rgba(255,77,166,0.6),
                     0 0 35px rgba(255,77,166,0.3);
    }
    100%{
        text-shadow: 0 0 5px rgba(255,255,255,0.3),
                     0 0 10px rgba(255,77,166,0.3);
    }
}

/* labels فوق العدّاد (بدون glow) */
.timer-labels{
    display:grid;
    grid-template-columns: repeat(4,1fr);
    gap:10px;
    margin-bottom:5px;
}

.timer-labels span{
    font-size:12px;
    font-weight:bold;
    color:#d63384;
}

/* العدّاد */
.timer{
    display:grid;
    grid-template-columns: repeat(4,1fr);
    gap:10px;
    margin-bottom:20px;
}

.timer span{
    height:65px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    font-weight:bold;
    color:white;
    background:#ff4da6;
    border-radius:16px;
    box-shadow:0 10px 20px rgba(0,0,0,0.25);
    animation:pulse 1.8s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.06);}
    100%{transform:scale(1);}
}

/* QR */
#qrcode img{
    width:160px;
    margin-top:15px;
    border-radius:15px;
    transform:scale(0);
    opacity:0;
    transition:0.6s;
}

.showQR img{
    transform:scale(1);
    opacity:1;
}

/* footer */
.footer{
    font-size:14px;
    margin-top:10px;
}

/* زر الموسيقى */
.music-control{
    margin-top:15px;
}

.music-control button{
    padding:10px 18px;
    border:none;
    border-radius:12px;
    background:#ff4da6;
    color:white;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

    <h1>A Special Surprise is Coming 🫰🏻💖</h1>

    <div class="name">Meriem</div>

    <!-- ✨ labels فوق العدّاد (بدون glow) -->
    <div class="timer-labels">
        <span>Days</span>
        <span>Hours</span>
        <span>Minutes</span>
        <span>Seconds</span>
    </div>

    <!-- العدّاد -->
    <div class="timer">
        <span id="d">0</span>
        <span id="h">0</span>
        <span id="m">0</span>
        <span id="s">0</span>
    </div>

    <div class="footer">I prepared the best for you 💌</div>

    <div id="qrcode"></div>

    <div class="music-control">
        <audio id="music" src="music.mp3" loop></audio>
        <button id="playBtn">▶️ Play Music</button>
    </div>

</div>

<script>
const target = new Date("2026-04-07T00:00:00").getTime();

setInterval(()=>{
    let now = new Date().getTime();
    let diff = target - now;

    if(diff < 0){
        document.querySelector(".timer").innerHTML = "🎉 Happy Birthday!";
        const qr = document.getElementById("qrcode");
        qr.innerHTML = '<img src="Qrcode.jpg">';
        setTimeout(()=> qr.classList.add("showQR"),100);
        return;
    }

    document.getElementById("d").innerText =
        Math.floor(diff/(1000*60*60*24));
    document.getElementById("h").innerText =
        Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    document.getElementById("m").innerText =
        Math.floor((diff%(1000*60*60))/(1000*60));
    document.getElementById("s").innerText =
        Math.floor((diff%(1000*60))/1000);

},1000);

// 🎵 الموسيقى
const music = document.getElementById("music");
const btn = document.getElementById("playBtn");
btn.addEventListener("click",()=>{
    music.play();
    btn.style.display="none";
});
</script>

</body>
</html>
