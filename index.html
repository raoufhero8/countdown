<!DOCTYPE html>
<html lang="en">
<head>
  <title>surprise for you 🫶🏻💖</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #ff6ec4, #7873f5, #42e695, #ffd86f); /* خلفية متدرجة وجميلة */
      background-size: 600% 600%;
      animation: bg 12s ease infinite;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: white;
    }

    @keyframes bg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      font-size: 3.5em;
      color: #fff;
      text-shadow: 2px 2px 15px rgba(0, 0, 0, 0.5);
      margin-top: 20px;
    }

    .name {
      font-size: 4em; /* تكبير "Meriem" */
      color: #ff69b4; /* لون مميز */
      font-weight: bold;
      margin-top: 20px;
      text-shadow: 2px 2px 15px rgba(0, 0, 0, 0.6); /* إضافة تأثير الظل */
    }

    #countdown {
      font-size: 2em;
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    .time-box {
      display: inline-block;
      background-color: #ff4da6;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      color: white;
      font-size: 2.5em;
      width: 80px;
      height: 80px;
      text-align: center;
    }

    .label {
      font-size: 1em;
      color: #fff;
      margin-top: 5px;
    }

    .footer {
      font-size: 1.5em;
      color: white;
      margin-top: 50px;
      text-shadow: 1px 1px 6px rgba(0, 0, 0, 0.3);
    }

    #surprise {
      display: none;
      margin-top: 50px;
      color: white;
    }

    #surprise a {
      font-size: 1.5em;
      text-decoration: none;
      color: #ff69b4;
      text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.5);
    }

    #music-btn {
      margin-top: 30px;
      padding: 10px 20px;
      background-color: #ff4da6;
      border: none;
      color: white;
      font-size: 1.2em;
      cursor: pointer;
      border-radius: 10px;
      box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
    }

    #music-btn:hover {
      background-color: #ff3385;
    }
  </style>
</head>
<body>

  <h1>A Special Surprise is Coming 🫰🏻💖</h1>
  <div class="name">Meriem</div>

  <!-- Countdown Boxes with labels -->
  <div id="countdown">
    <div>
      <div class="time-box" id="days"></div>
      <div class="label">Days</div>
    </div>
    <div>
      <div class="time-box" id="hours"></div>
      <div class="label">Hours</div>
    </div>
    <div>
      <div class="time-box" id="minutes"></div>
      <div class="label">Minutes</div>
    </div>
    <div>
      <div class="time-box" id="seconds"></div>
      <div class="label">Seconds</div>
    </div>
  </div>

  <!-- Footer Message under Countdown -->
  <div class="footer">I prepared the best for you 💌</div>

  <!-- Surprise Message -->
  <div id="surprise">
    <h2>The surprise is here!</h2>
    <a href="https://raoufhero8.github.io/happy-birthday/" target="_blank">Click here for the surprise!</a>
  </div>

  <!-- Music Button -->
  <audio id="background-music" src="music.mp3" preload="auto"></audio>
  <button id="music-btn">Play Music 🎶</button>

  <script>
    // Set the target date and time
    const targetDate = new Date("2026-04-07T00:00:00").getTime();

    // Update the countdown every 1 second
    const countdownInterval = setInterval(function() {

      // Get today's date and time
      const now = new Date().getTime();

      // Calculate the time difference
      const difference = targetDate - now;

      // Time calculations for days, hours, minutes and seconds
      const days = Math.floor(difference / (1000 * 60 * 60 * 24));
      const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((difference % (1000 * 60)) / 1000);

      // Display the countdown
      document.getElementById("days").innerHTML = days;
      document.getElementById("hours").innerHTML = hours;
      document.getElementById("minutes").innerHTML = minutes;
      document.getElementById("seconds").innerHTML = seconds;

      // If the countdown is over, display the surprise message and link
      if (difference < 0) {
        clearInterval(countdownInterval);
        document.getElementById("countdown").style.display = "none";
        document.getElementById("surprise").style.display = "block";
      }
    }, 1000);

    // Play music when the button is clicked
    document.getElementById("music-btn").addEventListener("click", function() {
      var music = document.getElementById("background-music");
      music.play();
      this.style.display = "none"; // Hide the button after clicking
    });
  </script>

</body>
</html>
